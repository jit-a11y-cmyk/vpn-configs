<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHOST AI | Advanced</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-surface: #1e1f20;
            --bg-input: #282a2c;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --accent: #a8c7fa;
            --border-color: #444746;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-main);
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .greeting {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            transition: opacity 0.3s;
        }
        
        .greeting h1 {
            font-size: 40px;
            background: -webkit-linear-gradient(45deg, #a8c7fa, #c4c7c5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            font-weight: 500;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message-row {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-ai { background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--accent); }
        .avatar-user { background: #3f4a5c; color: white; font-weight: bold; font-size: 14px; }

        .message-content {
            flex: 1;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message-content img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: block;
            border: 1px solid var(--border-color);
        }

        .input-wrapper {
            width: 100%;
            max-width: 840px;
            margin: 0 auto;
            padding: 0 20px 20px 20px;
            box-sizing: border-box;
            background: var(--bg-main);
        }

        .image-preview-container {
            display: none;
            padding: 10px;
            background: var(--bg-surface);
            border-radius: 12px 12px 0 0;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .image-preview-container img {
            height: 60px;
            border-radius: 8px;
        }

        .remove-image {
            position: absolute;
            top: 5px;
            left: 65px;
            background: #000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .input-box {
            background: var(--bg-input);
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(168, 199, 250, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C12 2 12 8 18 8C12 8 12 14 12 14C12 14 12 8 6 8C12 8 12 2 12 2ZM17 14C17 14 17 17 20 17C17 17 17 20 17 20C17 20 17 17 14 17C17 17 17 14 17 14Z"/></svg>
            Ghost AI 1.5
        </div>
        <div class="avatar avatar-user" style="width: 32px; height: 32px; font-size: 10px;">GL</div>
    </div>

    <div class="greeting" id="greeting">
        <h1>Марша вогIийла, Брат</h1>
        <p style="color: var(--text-secondary);">Я Ghost AI. Скинь задачу или фото.</p>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="chat-content" id="chatContent"></div>
    </div>

    <div class="input-wrapper">
        <div class="image-preview-container" id="imagePreviewContainer">
            <img id="imagePreview" src="">
            <button class="remove-image" onclick="removeImage()">✕</button>
        </div>
        <div class="input-box">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <textarea id="userInput" placeholder="Введите запрос..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="icon-btn" id="sendBtn" onclick="sendMessage()" style="color: var(--accent);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAX53N5GYUnl7IjCH5Hcn50ARI54Wqy98k";
        const chatContent = document.getElementById('chatContent');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const greeting = document.getElementById('greeting');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');

        let currentImageBase64 = null;
        let currentImageMimeType = null;

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.style.display = 'block';
                    currentImageBase64 = e.target.result.split(',')[1];
                    currentImageMimeType = file.type;
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            imagePreviewContainer.style.display = 'none';
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            greeting.style.display = 'none';
            const userImg = currentImageBase64 ? imagePreview.src : null;
            const userText = text;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.innerHTML = '<div class="loader"></div>';

            addUserMessage(userText, userImg);
            
            const aiMsgId = 'ai-' + Date.now();
            addAIMessage('<div class="loader"></div>', aiMsgId);
            
            const imgData = currentImageBase64;
            const imgMime = currentImageMimeType;
            removeImage();

            try {
                // ПЕРЕХОД НА V1 API ДЛЯ СТАБИЛЬНОСТИ
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{
                            "parts": [
                                { "text": "Ты Ghost AI. Строгий, экспертный стиль. Ты чеченский помощник. Решай задачи ВПР и математику. Отвечай по-братски. Запрос: " + (userText || "Разбери фото.") },
                                ...(imgData ? [{ "inlineData": { "mimeType": imgMime, "data": imgData } }] : [])
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const box = document.getElementById(aiMsgId);

                if (data.error) {
                    box.innerHTML = "❌ Ошибка: " + data.error.message;
                } else {
                    let resText = data.candidates[0].content.parts[0].text;
                    box.innerHTML = resText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                }
            } catch (e) {
                document.getElementById(aiMsgId).innerHTML = "❌ Ошибка сети. Проверь Ghost Link VPN.";
            } finally {
                userInput.disabled = false;
                sendBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            }
        }

        function addUserMessage(t, img) {
            chatContent.innerHTML += `<div class="message-row"><div class="avatar avatar-user">GL</div><div class="message-content">${img ? `<img src="${img}">` : ''}${t}</div></div>`;
        }

        function addAIMessage(t, id) {
            chatContent.innerHTML += `<div class="message-row"><div class="avatar avatar-ai">✨</div><div class="message-content" id="${id}">${t}</div></div>`;
        }
    </script>
</body>
</html>
