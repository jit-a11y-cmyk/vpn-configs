<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Link | Admin System 👻</title>
    <style>
        /* Твой стиль (оставил без изменений для красоты) */
        :root { --bg-color: radial-gradient(circle at top, #1e293b 0%, #020617 100%); --card-bg: rgba(23, 23, 23, 0.8); --text-color: #f8fafc; --accent-blue: #3b82f6; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; border: 1px solid var(--accent-blue); text-align: center; box-shadow: 0 0 25px rgba(59, 130, 246, 0.15); }
        .logo { font-size: 32px; font-weight: 900; margin-bottom: 10px; text-shadow: 0 0 15px var(--accent-blue); }
        .status-box { background: #111827; border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid #1e293b; text-align: left; }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .label { color: #64748b; }
        .value { color: var(--accent-blue); font-weight: 600; }
        .btn { display: block; background: #2563eb; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 600; margin-bottom: 12px; border: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        .btn-v2 { background: #4f46e5; }
        .footer { color: #475569; font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">👻 Ghost Link</div>
        <div class="status-box">
            <div class="status-row"><span class="label">ID Пользователя:</span><span class="value" id="userDisplayId">Новый</span></div>
            <div class="status-row"><span class="label">Статус:</span><span class="value">Premium VIP</span></div>
            <div class="status-row"><span class="label">База данных:</span><span class="value" style="color: #4ade80;">GitHub Cloud</span></div>
        </div>

        <button onclick="handleImport('Android', 'https://vpnone.ru/connect/?url=v2raytun%3A%2F%2Fimport%2Fhttps://raw.githubusercontent.com/ТВОЙ_ЛОГИН/ТВОЙ_РЕПО/main/vpn.txt')" class="btn btn-v2">
            🤖 Импорт для V2RayTun
        </button>
        
        <button onclick="handleImport('iOS', 'https://vpnone.ru/connect/?url=happ%3A%2F%2Fadd%2Fhttps://raw.githubusercontent.com/ТВОЙ_ЛОГИН/ТВОЙ_РЕПО/main/vpn.txt')" class="btn">
            🍏 Импорт для Happ
        </button>

        <div class="footer">Система Ghost Link v2.0 | Чистый GitHub</div>
    </div>

    <script>
        // --- ТВОИ НАСТРОЙКИ ---
        const TG_TOKEN = '8690560527:AAE6_jgQ3nK5vwFBX2D4PoSbGKnLApMqqr4';
        const TG_CHAT_ID = '8758774981';
        const GH_TOKEN = 'ВСТАВЬ_СЮДА_ТОКЕН_ИЗ_ШАГА_2'; 
        const GH_REPO = 'ТВОЙ_ЛОГИН/ТВОЙ_РЕПОЗИТОРИЙ'; // Например: ghost/my-vpn

        async function handleImport(platform, configUrl) {
            let userId = localStorage.getItem('ghost_user_id');
            
            // Если пользователя еще нет в нашей "базе"
            if (!userId) {
                userId = 'GL-' + Math.floor(Math.random() * 9000 + 1000);
                localStorage.setItem('ghost_user_id', userId);
                
                try {
                    // 1. Получаем текст из vpn.txt
                    const vpnRes = await fetch('vpn.txt');
                    const vpnText = await vpnRes.text();

                    // 2. Создаем файл в database/users/ID.txt
                    const filePath = `database/users/${userId}.txt`;
                    const contentBase64 = btoa(unescape(encodeURIComponent(vpnText)));

                    await fetch(`https://api.github.org/repos/${GH_REPO}/contents/${filePath}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GH_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Регистрация ${userId}`,
                            content: contentBase64
                        })
                    });

                    // 3. Отправляем уведомление в Telegram со ссылкой на УДАЛЕНИЕ
                    const deletePageUrl = `https://github.com/${GH_REPO}/delete/main/${filePath}`;
                    const msg = `👤 *Новый пользователь!*
🆔 ID: \`${userId}\`
📱 Платформа: ${platform}
📂 Файл в базе создан.

🗑 [УДАЛИТЬ ПОДПИСКУ (БАН)](${deletePageUrl})`;

                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

                } catch (e) {
                    console.error("Ошибка системы:", e);
                }
            }

            // Перекидываем на конфиг
            window.location.href = configUrl;
        }

        // Показ ID при загрузке
        window.onload = () => {
            const id = localStorage.getItem('ghost_user_id');
            if(id) document.getElementById('userDisplayId').innerText = id;
        }
    </script>
</body>
</html>
